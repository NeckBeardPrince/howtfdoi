# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: howtfdoi

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: howtfdoi
    directory: Casks
    repository:
      owner: NeckBeardPrince
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: bump howtfdoi to {{ .Tag }}"
    homepage: "https://github.com/NeckBeardPrince/howtfdoi"
    description: "Instant AI-powered CLI command answers from your terminal"
    binaries:
      - howtfdoi
    generate_completions_from_executable:
      shells: [bash, zsh, fish]
      shell_parameter_format: completion
    caveats: |
      howtfdoi is not notarized. If macOS Gatekeeper blocks it on first run, remove the quarantine attribute:
        xattr -d com.apple.quarantine $(which howtfdoi)
